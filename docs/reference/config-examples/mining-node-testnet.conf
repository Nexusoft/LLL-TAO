#
# Nexus Node Configuration - Mining on Testnet
#
# This configuration enables mining on the Nexus testnet for testing and
# development purposes.
#
# Usage:
#   1. Copy this file to ~/.Nexus/nexus.conf
#   2. Edit the RPC/API credentials
#   3. Start the node: ./nexus
#   4. Connect miners to port 8323 (testnet mining port)
#

#==============================================================================
# TESTNET MODE (REQUIRED)
#==============================================================================

# Enable testnet mode
# This changes all default ports and connects to testnet peers
testnet=1

#==============================================================================
# BASIC AUTHENTICATION (REQUIRED)
#==============================================================================

# RPC authentication
rpcuser=testnet_rpc_user
rpcpassword=testnet_rpc_password

# API authentication
apiuser=testnet_api_user
apipassword=testnet_api_password

# Run as daemon
daemon=1

#==============================================================================
# MINING SERVER (TESTNET CONFIGURATION)
#==============================================================================

# Enable mining server
mining=1

# Testnet mining port: 8323 (automatically set by testnet=1)
# You can override with:
#miningport=8323

# Fewer threads needed for testnet
miningthreads=2

# Standard timeout
miningtimeout=30

#==============================================================================
# NETWORK CONFIGURATION (TESTNET)
#==============================================================================

# Allow connections from localhost and local network
llpallowip=127.0.0.1
llpallowip=192.168.1.0/24

# Testnet uses different ports:
# - Tritium: 8888 (instead of 9888)
# - API: 7080 (instead of 8080)
# - RPC: 8336 (instead of 9336)
# - Mining: 8323 (instead of 9325)
# - P2P: 8326 (instead of 9326)

# Fewer connections needed for testnet
maxconnections=8

#==============================================================================
# PERFORMANCE TUNING (TESTNET)
#==============================================================================

# Smaller cache for testnet
dbcache=256

# Fewer threads
threads=2

#==============================================================================
# LOGGING (VERBOSE FOR TESTING)
#==============================================================================

# More verbose logging for testnet debugging
verbose=3

# Enable logging
log=1
logtimestamps=1

#==============================================================================
# OPTIONAL: TESTNET STAKING
#==============================================================================

# Enable staking on testnet
#stake=1

#==============================================================================
# NOTES
#==============================================================================
#
# TESTNET PURPOSE:
# - Test new features before mainnet deployment
# - Develop and debug mining software
# - Experiment with configurations
# - No real value - testnet coins have no monetary worth
#
# TESTNET FAUCET:
# - Get testnet NXS for staking: https://testnet.nexus.io/faucet
# - Join testnet Discord for support: https://nexus.io/discord
#
# TESTNET EXPLORER:
# - View testnet blockchain: https://testnet.nexus.io/explorer
#
# PORT CHANGES (TESTNET):
# - All default ports are shifted for testnet
# - Miners connect to port 8323 instead of 9325
# - API uses 7080 instead of 8080
# - RPC uses 8336 instead of 9336
#
# RESETTING TESTNET:
# - Testnet resets periodically when needed
# - Backup important test data before resets
# - Follow announcements on Discord/forum
#
# MINER CONFIGURATION (TESTNET):
# nexusminer --host=<node_ip> --port=8323 --testnet=1
#
# CROSS-REFERENCES:
# - Testnet documentation: docs/build-params-reference.md
# - Configuration reference: docs/reference/nexus.conf.md
# - Mining server docs: docs/current/mining/mining-server.md
#
#==============================================================================
