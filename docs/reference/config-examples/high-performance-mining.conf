#
# Nexus Node Configuration - High-Performance Mining Pool
#
# This configuration is optimized for running a large public mining pool with
# many concurrent miners. Includes SSL, DDOS protection, and performance tuning.
#
# Usage:
#   1. Copy this file to ~/.Nexus/nexus.conf
#   2. Edit ALL the credentials and paths
#   3. Generate SSL certificates
#   4. Start the node: ./nexus
#   5. Miners connect via SSL to port 9325
#

#==============================================================================
# BASIC AUTHENTICATION (REQUIRED)
#==============================================================================

# RPC authentication
# ⚠️  SECURITY WARNING: Replace these placeholder passwords with strong,
#     unique passwords before deploying to production!
#     Use minimum 32 characters, mix of letters, numbers, symbols.
rpcuser=pool_admin_user
rpcpassword=REPLACE_WITH_STRONG_PASSWORD_MIN_32_CHARS

# API authentication
# ⚠️  SECURITY WARNING: Use different password than RPC!
apiuser=pool_api_user
apipassword=REPLACE_WITH_DIFFERENT_STRONG_PASSWORD_MIN_32_CHARS

# Run as daemon
daemon=1

#==============================================================================
# HIGH-PERFORMANCE MINING SERVER
#==============================================================================

# Enable mining server
mining=1

# Mining port (standard)
miningport=9325

# High thread count for many miners
# Recommended: 2 threads per 10 concurrent miners
# For 100 miners: 20 threads
# For 500 miners: 100 threads (may need scaling)
miningthreads=32

# Socket timeout (generous for slow connections)
miningtimeout=60

#==============================================================================
# SSL/TLS SECURITY (REQUIRED FOR PUBLIC POOLS)
#==============================================================================

# Enable SSL for mining
miningssl=1

# Require SSL (reject non-SSL connections)
miningsslrequired=1

# SSL certificate and private key paths
# Generate with:
#   openssl req -x509 -newkey rsa:4096 -keyout mining-pool.key \
#     -out mining-pool.crt -days 365 -nodes \
#     -subj "/CN=your-pool.example.com"
sslcert=/etc/nexus/ssl/mining-pool.crt
sslkey=/etc/nexus/ssl/mining-pool.key

# IMPORTANT: Secure private key permissions
# chmod 600 /etc/nexus/ssl/mining-pool.key
# chown nexus:nexus /etc/nexus/ssl/mining-pool.key

#==============================================================================
# DDOS PROTECTION (CRITICAL FOR PUBLIC POOLS)
#==============================================================================

# Enable DDOS protection
miningddos=1

# Connection score threshold
# Lower = more aggressive (blocks faster)
# Higher = more permissive
# Default: 1, Recommended for public pool: 2-5
miningcscore=3

# Request score threshold
# Lower = stricter rate limiting
# Higher = more permissive
# Default: 50, Recommended for public pool: 100-200
miningrscore=150

# Time window for scoring (seconds)
# Default: 60, Recommended: 60-120
miningtimespan=90

#==============================================================================
# NETWORK CONFIGURATION (PUBLIC POOL)
#==============================================================================

# Allow connections from anywhere (public pool)
# SSL and Falcon auth provide security
llpallowip=0.0.0.0/0

# High connection limits for many miners
maxconnections=32
maxincoming=200
maxoutgoing=16

#==============================================================================
# HIGH-PERFORMANCE TUNING
#==============================================================================

# Large database cache (requires sufficient RAM)
# Recommended: 2-4 GB for large pools
# 1 MB = 1 value, so 4096 = 4 GB
dbcache=4096

# High thread count for parallel processing
# Match physical CPU cores (not hyperthreads)
threads=16

# Large mempool for transaction handling
mempool.max=200000

#==============================================================================
# API CONFIGURATION (FOR POOL FRONTEND)
#==============================================================================

# Enable API
api=1

# Allow remote API access (for pool stats, web interface)
apiremote=1

# API ports
apiport=8080
apisslport=8443

# Enable API SSL (recommended)
apissl=1
apisslrequired=1

# API DDOS protection
apiddos=1
apicscore=3
apirscore=200
apitimespan=90
apitimeout=60

# More API threads for web traffic
apithreads=16

#==============================================================================
# LOGGING (PRODUCTION)
#==============================================================================

# Standard logging (not too verbose for production)
verbose=2

# Enable logging to file
log=1

# Timestamps in logs
logtimestamps=1

# Log file location (optional, defaults to datadir/debug.log)
#logfile=/var/log/nexus/pool.log

#==============================================================================
# SYSTEM RESOURCE LIMITS
#==============================================================================

# Set datadir to dedicated disk/partition
#datadir=/mnt/nexus-data

# These are set via system configuration, not nexus.conf:
# - ulimit -n 65536  (file descriptors)
# - ulimit -u 4096   (processes/threads)
# - vm.swappiness=10 (minimize swap)
# - kernel networking tunables for high throughput

#==============================================================================
# OPTIONAL: MONITORING AND MAINTENANCE
#==============================================================================

# RPC for monitoring tools
server=1
rpcport=9336

# RPC threads for monitoring queries
rpcthreads=4

#==============================================================================
# NOTES FOR POOL OPERATORS
#==============================================================================
#
# BEFORE STARTING:
# ================
#
# 1. SSL CERTIFICATES:
#    - Generate valid SSL certificates
#    - Use Let's Encrypt for public pool (free, trusted)
#    - Secure private key (chmod 600, owned by nexus user)
#
# 2. SYSTEM RESOURCES:
#    - Minimum: 16 GB RAM, 8 CPU cores, SSD storage
#    - Recommended: 32 GB RAM, 16 CPU cores, NVMe SSD
#    - Excellent: 64 GB RAM, 32 CPU cores, RAID NVMe
#
# 3. NETWORK:
#    - Dedicated IP address
#    - High bandwidth (100+ Mbps)
#    - Low latency to major miner locations (<100ms)
#    - Firewall rules: Allow 9325/tcp, 9326/tcp, 9888/tcp
#
# 4. OPERATING SYSTEM:
#    - Linux (Ubuntu 22.04 LTS or CentOS 8/9 recommended)
#    - Kernel 5.x+ for best networking performance
#    - Disable swap or set vm.swappiness=10
#    - Increase file descriptor limits (ulimit -n 65536)
#
# SCALING GUIDELINES:
# ===================
#
# For 100 miners:
#   miningthreads=16
#   dbcache=2048
#   threads=8
#   Resources: 16 GB RAM, 8 cores
#
# For 500 miners:
#   miningthreads=32
#   dbcache=4096
#   threads=16
#   Resources: 32 GB RAM, 16 cores
#
# For 1000+ miners:
#   Consider load balancing across multiple nodes
#   Use dedicated database server
#   Implement caching layer
#   Contact Nexus team for architecture consultation
#
# MONITORING:
# ===========
#
# Monitor these metrics:
# - CPU usage (should be < 80% average)
# - Memory usage (should be < 90% total)
# - Network bandwidth (watch for saturation)
# - Disk I/O (SSD/NVMe essential)
# - Connection count (via `netstat -an | grep 9325 | wc -l`)
# - Template generation time (check logs)
# - Block submission rate (accepted vs. rejected)
#
# SECURITY:
# =========
#
# - Keep node software updated
# - Use firewall (ufw, iptables, or cloud firewall)
# - Enable fail2ban for SSH
# - Monitor logs for suspicious activity
# - Regular security audits
# - Backup critical data
# - Disaster recovery plan
#
# PERFORMANCE TROUBLESHOOTING:
# ============================
#
# If slow performance:
# - Check CPU usage (top/htop)
# - Check I/O wait (iostat -x 1)
# - Check network (iftop, nethogs)
# - Review logs for slow operations
# - Consider scaling up resources
# - See docs/current/troubleshooting/mining-server-issues.md
#
