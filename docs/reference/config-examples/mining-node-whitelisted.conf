#
# Nexus Node Configuration - Mining with Key Whitelisting
#
# This configuration enables mining with Falcon public key whitelisting for
# enhanced security. Only miners with whitelisted keys can connect.
#
# Usage:
#   1. Copy this file to ~/.Nexus/nexus.conf
#   2. Edit the RPC/API credentials
#   3. Add your miners' Falcon public keys to minerallowkey entries
#   4. Start the node: ./nexus
#   5. Only whitelisted miners can connect
#

#==============================================================================
# BASIC AUTHENTICATION (REQUIRED)
#==============================================================================

# RPC authentication
rpcuser=your_rpc_username_here
rpcpassword=your_secure_rpc_password_here

# API authentication
apiuser=your_api_username_here
apipassword=your_secure_api_password_here

# Run as daemon
daemon=1

#==============================================================================
# MINING SERVER WITH KEY WHITELISTING
#==============================================================================

# Enable mining server
mining=1

# Mining port
miningport=9323

# Mining threads
miningthreads=4

# Socket timeout
miningtimeout=30

#------------------------------------------------------------------------------
# FALCON PUBLIC KEY WHITELIST
#------------------------------------------------------------------------------

# Whitelist specific miner Falcon public keys
# Only miners with these public keys can authenticate
#
# Key format: Hexadecimal string
# - Falcon-512: 897 bytes = 1794 hex characters
# - Falcon-1024: 1793 bytes = 3586 hex characters
#
# To get a miner's public key:
#   nexusminer --export-pubkey > miner_pubkey.txt
#
# Then add the hex string here (one per line):

# Example Falcon-1024 keys (REPLACE WITH YOUR ACTUAL KEYS):
minerallowkey=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
minerallowkey=fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210

# Add more miners as needed (one per line):
#minerallowkey=<hex_string_3586_chars>
#minerallowkey=<hex_string_3586_chars>

# SECURITY NOTE: 
# - If NO minerallowkey entries are present, ALL miners can connect (default)
# - If ANY minerallowkey entries are present, ONLY listed miners can connect
# - This provides strong access control for private pools

#==============================================================================
# NETWORK CONFIGURATION
#==============================================================================

# Allow LLP connections from specific networks
# Since we're using key whitelisting, we can allow broader network access
llpallowip=127.0.0.1
llpallowip=192.168.1.0/24
llpallowip=10.0.0.0/8

# Or allow all IPs (keys provide security):
#llpallowip=0.0.0.0/0

# P2P connections
maxconnections=16

#==============================================================================
# PERFORMANCE TUNING
#==============================================================================

# Standard database cache
dbcache=512

# Standard thread count
threads=4

#==============================================================================
# LOGGING
#==============================================================================

# Standard logging
verbose=2
log=1
logtimestamps=1

#==============================================================================
# OPTIONAL: ENHANCED SECURITY
#==============================================================================

# Enable SSL/TLS for mining connections (recommended for remote access)
#miningssl=1
#miningsslrequired=1
#sslcert=/path/to/server.crt
#sslkey=/path/to/server.key

# Enable DDOS protection (optional, less critical with key whitelisting)
#miningddos=1
#miningcscore=1
#miningrscore=50
#miningtimespan=60

#==============================================================================
# NOTES
#==============================================================================
#
# KEY WHITELIST WORKFLOW:
#
# 1. Generate Falcon keys on each miner:
#    nexusminer --generate-keys --falcon=1024
#
# 2. Export public key:
#    nexusminer --export-pubkey > miner1_pubkey.txt
#
# 3. Add public key hex to minerallowkey (one line, no spaces)
#
# 4. Restart node to apply changes
#
# 5. Miner can now connect (will be authenticated via Falcon)
#
# SECURITY BENEFITS:
# - Only authorized miners can connect
# - Quantum-resistant authentication (Falcon-1024)
# - No password leaks (cryptographic keys instead)
# - Easy to revoke access (remove key from list)
# - Audit trail (each miner has unique key)
#
# USE CASES:
# - Private mining pools
# - Corporate mining operations
# - Restricted testnet access
# - High-security environments
#
# KEY MANAGEMENT:
# - Store miner public keys securely
# - Keep private keys on miner machines only
# - Backup keys regularly
# - Rotate keys periodically for maximum security
#
# REVOKING ACCESS:
# - Remove miner's public key from minerallowkey list
# - Restart node
# - Miner will fail authentication on next connection attempt
#
# CROSS-REFERENCES:
# - Configuration reference: docs/reference/nexus.conf.md
# - Key whitelisting guide: docs/current/security/key-whitelisting.md
# - Falcon authentication: docs/current/authentication/falcon-verification.md
# - Troubleshooting: docs/current/troubleshooting/mining-server-issues.md
#
