#
# nexus.conf — Nexus Node Pool Server (Minimum Required)
# Location: ~/.Nexus/nexus.conf
# SECURITY: chmod 600 ~/.Nexus/nexus.conf
#

# ==============================================================================
# AUTOLOGIN — Required for unattended node operation
# ==============================================================================
autologin=1
username=YOUR_USERNAME
password=YOUR_PASSWORD
pin=YOUR_PIN

# ==============================================================================
# API AUTHENTICATION
# ==============================================================================
apiuser=YOUR_API_USERNAME
apipassword=YOUR_STRONG_API_PASSWORD

# ==============================================================================
# SERVERS
# server=1 enables the RPC server (port 9336 mainnet)
# ==============================================================================
server=1

# ==============================================================================
# MINING — Enables BOTH servers simultaneously when mining=1:
#
#   PORT 9323  →  Stateless Mining Server  (NexusMiner stateless protocol)
#   PORT 8323  →  Legacy Mining Server     (backward-compatible miners)
#
# The legacy server starts automatically with mining=1.
# To disable legacy mining: legacyminingport=0
# ==============================================================================
mining=1
miningport=9323          # Stateless mining port (default mainnet)
legacyminingport=8323    # Legacy mining port    (auto-starts with mining=1)

# ==============================================================================
# NETWORK
# ==============================================================================
listen=1
maxconnections=99

# LLP Allow IP — which IPs may connect to mining ports:
# Localhost only (for local testing):
llpallowip=127.0.0.1
# Open to internet (public pool — miners point to YOUR_PUBLIC_IP:9323):
#llpallowip=0.0.0.0

# ==============================================================================
# FALCON — Post-quantum Falcon-1024 authentication
# ==============================================================================
falcon=1

# ==============================================================================
# LOGGING
# ==============================================================================
verbose=2
log=1

# ==============================================================================
# PORT REFERENCE
# Port 9323  — Stateless mining  (NexusMiner connects here)
# Port 8323  — Legacy mining     (backward-compatible miners)
# Port 8080  — API               (localhost only by default)
# Port 9336  — RPC               (localhost only by default)
# Port 9888  — P2P Tritium
# ==============================================================================
