#
# Nexus Node Configuration - Mining Enabled (Basic)
#
# This configuration enables the mining server for basic solo or pool mining.
# Suitable for local mining or small private pools.
#
# Usage:
#   1. Copy this file to ~/.Nexus/nexus.conf
#   2. Edit the RPC/API credentials
#   3. Start the node: ./nexus
#   4. Connect miners to port 9325 (mainnet) or 8323 (testnet)
#

#==============================================================================
# BASIC AUTHENTICATION (REQUIRED)
#==============================================================================

# RPC authentication (used by RPC clients)
rpcuser=your_rpc_username_here
rpcpassword=your_secure_rpc_password_here

# API authentication (used by web interfaces and API clients)
apiuser=your_api_username_here
apipassword=your_secure_api_password_here

# Run as daemon (background process)
daemon=1

#==============================================================================
# MINING SERVER (BASIC CONFIGURATION)
#==============================================================================

# Enable mining server
# This allows miners to connect and receive block templates
mining=1

# Mining port (default: 9325 for mainnet, 8323 for testnet)
# Uncomment to use custom port:
#miningport=9325

# Number of threads for template generation and validation
# Default: Number of CPU cores
# Recommended: 2-4 for solo mining, 4-8 for small pools
miningthreads=4

# Socket timeout for mining connections (seconds)
# Default: 30 seconds
# Increase if miners have slow connections
miningtimeout=30

#==============================================================================
# NETWORK CONFIGURATION
#==============================================================================

# Allow LLP connections from specific IPs
# Default: 127.0.0.1 (localhost only)
# For remote miners, add their IP addresses or networks:
llpallowip=127.0.0.1
#llpallowip=192.168.1.0/24    # Local network
#llpallowip=10.0.0.0/8        # VPN network

# Maximum P2P connections
# Default: 16
maxconnections=16

#==============================================================================
# PERFORMANCE TUNING (BASIC)
#==============================================================================

# Database cache size (MB)
# Default: 256 MB
# Recommended: 512 MB for mining, 1024 MB for pools
dbcache=512

# General thread count
# Default: Number of CPU cores
threads=4

#==============================================================================
# LOGGING
#==============================================================================

# Logging verbosity (0-5)
# 0 = Errors only
# 1 = Warnings and errors
# 2 = Info, warnings, errors (recommended for mining)
# 3 = Verbose (debug information)
# 4-5 = Very verbose (development)
verbose=2

# Enable logging to file
log=1

# Include timestamps in logs
logtimestamps=1

#==============================================================================
# OPTIONAL: STAKING
#==============================================================================

# Enable staking on this node (requires funded account and unlocked wallet)
# Uncomment to enable:
#stake=1

#==============================================================================
# NOTES
#==============================================================================
#
# SECURITY:
# - This configuration allows LOCAL mining only (127.0.0.1)
# - To allow remote miners, add their IPs to llpallowip
# - Consider using SSL for remote mining (see mining-node-ssl.conf example)
#
# MINER CONFIGURATION:
# - Miners connect to: <node_ip>:9325 (mainnet) or <node_ip>:8323 (testnet)
# - Miners authenticate with Falcon keys (no separate credentials needed)
# - Miners set their reward address via MINER_SET_REWARD opcode
#
# FIREWALL:
# - Ensure port 9325 (or 8323) is accessible from miner IPs
# - Use firewall rules to restrict access to trusted IPs
#
# PERFORMANCE:
# - Start with these defaults and adjust based on monitoring
# - Increase miningthreads if serving many miners
# - Increase dbcache if system has sufficient RAM
#
# CROSS-REFERENCES:
# - Configuration reference: docs/reference/nexus.conf.md
# - Mining server docs: docs/current/mining/mining-server.md
# - Troubleshooting: docs/current/troubleshooting/mining-server-issues.md
#
#==============================================================================
