<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Mining Staleness Detection — Interactive Training</title>
  <style>
    /* ── RESET & TOKENS ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --red:       #f85149;
      --yellow:    #d29922;
      --purple:    #a371f7;
      --orange:    #f0883e;
      --teal:      #39d3bb;
      --radius:    8px;
      --mono:      'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── LAYOUT ──────────────────────────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
    header .subtitle { color: var(--muted); font-size: 12px; flex: 1; }

    .score-box {
      display: flex;
      gap: 16px;
      font-size: 12px;
    }
    .score-box span { color: var(--muted); }
    .score-box strong { color: var(--text); }
    #scoreCorrect { color: var(--green); font-weight: 700; }
    #scoreWrong   { color: var(--red);   font-weight: 700; }

    .progress-bar {
      height: 3px;
      background: var(--border);
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      transition: width .3s ease;
    }

    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 0;
    }
    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      padding: 4px 16px 8px;
    }
    .scenario-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
      user-select: none;
    }
    .scenario-item:hover { background: var(--surface2); }
    .scenario-item.active {
      background: var(--surface2);
      border-left-color: var(--accent);
    }
    .scenario-item .num {
      font-size: 11px;
      color: var(--muted);
      width: 18px;
      flex-shrink: 0;
      font-family: var(--mono);
    }
    .scenario-item .label {
      font-size: 12px;
      color: var(--text);
      flex: 1;
    }
    .scenario-item .badge {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .badge-correct { background: var(--green);  color: #0d1117; }
    .badge-wrong   { background: var(--red);    color: #ffffff; }
    .badge-pending { background: var(--border); }

    /* ── CONTENT PANEL ───────────────────────────────────────────────────────── */
    .content {
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── CARD ────────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .lane-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .lane-stateless { background: #1f3463; color: var(--accent); border: 1px solid #264a82; }
    .lane-legacy    { background: #2d1f00; color: var(--orange); border: 1px solid #5a3d00; }
    .lane-both      { background: #1f2d1f; color: var(--green);  border: 1px solid #2d5a2d; }

    .card h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card .desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── SVG DIAGRAM ─────────────────────────────────────────────────────────── */
    .diagram-wrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-x: auto;
    }
    .diagram-wrap svg { display: block; max-width: 100%; margin: 0 auto; }

    /* ── STATE TABLE ─────────────────────────────────────────────────────────── */
    .state-table {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      width: 100%;
    }
    .state-table table { width: 100%; border-collapse: collapse; }
    .state-table th {
      text-align: left;
      background: var(--surface2);
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 6px 12px;
    }
    .state-table td {
      padding: 6px 12px;
      border-top: 1px solid var(--border);
      color: var(--text);
    }
    .state-table tr:hover td { background: #ffffff06; }
    .val-ok   { color: var(--green);  font-weight: 600; }
    .val-bad  { color: var(--red);    font-weight: 600; }
    .val-warn { color: var(--yellow); font-weight: 600; }
    .val-info { color: var(--accent); }

    /* ── QUESTION ────────────────────────────────────────────────────────────── */
    .question-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .question-box .q-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .question-box p {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .opt-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      font-size: 13px;
      transition: border-color .15s, background .15s;
    }
    .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #1d2d44; }
    .opt-btn:disabled { cursor: default; }
    .opt-btn .opt-key {
      font-family: var(--mono);
      font-size: 11px;
      width: 22px;
      height: 22px;
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex-shrink: 0;
    }
    .opt-btn.correct { border-color: var(--green); background: #1a3a1a; color: var(--green); }
    .opt-btn.correct .opt-key { border-color: var(--green); color: var(--green); }
    .opt-btn.wrong   { border-color: var(--red);   background: #3a1a1a; color: var(--red);   }
    .opt-btn.wrong .opt-key   { border-color: var(--red);   color: var(--red);   }

    /* ── FEEDBACK ────────────────────────────────────────────────────────────── */
    .feedback {
      display: none;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.6;
    }
    .feedback.show { display: block; }
    .feedback.correct { background: #1a3a1a; border: 1px solid #3fb95060; color: var(--green); }
    .feedback.wrong   { background: #3a1a1a; border: 1px solid #f8514960; color: #ff9494; }
    .feedback strong  { display: block; margin-bottom: 6px; font-size: 14px; }
    .feedback code {
      background: #00000040;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 11px;
    }

    /* ── NAV BUTTONS ─────────────────────────────────────────────────────────── */
    .nav-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn {
      padding: 7px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: var(--surface); border-color: var(--accent); }
    .btn.primary { background: #1d3557; border-color: var(--accent); color: var(--accent); }
    .btn.primary:hover { background: #264a7a; }
    .btn-icon { font-size: 15px; }
    .hint-text { font-size: 11px; color: var(--muted); margin-left: auto; }

    /* ── FOOTER ──────────────────────────────────────────────────────────────── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    footer kbd {
      display: inline-block;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 4px;
      font-family: var(--mono);
      font-size: 10px;
    }

    /* ── RESULT SCREEN ───────────────────────────────────────────────────────── */
    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }
    .result-screen.show { display: flex; }
    .result-screen .trophy { font-size: 64px; }
    .result-screen h2 { font-size: 24px; font-weight: 700; color: var(--text); }
    .result-screen .final-score { font-size: 48px; font-weight: 800; color: var(--accent); }
    .result-screen .breakdown { color: var(--muted); font-size: 14px; }
    .result-screen .breakdown span { margin: 0 8px; }
    .result-screen .breakdown .ok  { color: var(--green); }
    .result-screen .breakdown .bad { color: var(--red);   }

    /* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
  <header>
    <h1>⛏ Nexus Staleness Detection</h1>
    <span class="subtitle">Interactive Training · 12 Scenarios</span>
    <div class="score-box">
      <span>Correct: <strong id="scoreCorrect">0</strong></span>
      <span>Wrong: <strong id="scoreWrong">0</strong></span>
      <span>Scenario: <strong id="scoreCurrent">1</strong>/<strong>12</strong></span>
    </div>
  </header>
  <div class="progress-bar"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>

  <main>
    <!-- ── SIDEBAR ──────────────────────────────────────────────────────────── -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-title">Scenarios</div>
      <!-- Items injected by JS -->
    </nav>

    <!-- ── CONTENT ──────────────────────────────────────────────────────────── -->
    <div class="content" id="content">
      <!-- Scenario cards injected by JS -->
    </div>
  </main>

  <!-- ── FOOTER ─────────────────────────────────────────────────────────────── -->
  <footer>
    <span><kbd>←</kbd> <kbd>→</kbd> Navigate</span>
    <span><kbd>A</kbd>–<kbd>D</kbd> Answer options</span>
    <span><kbd>R</kbd> Restart</span>
    <span>Source: <code>src/LLP/stateless_miner.cpp · src/LLP/miner.cpp</code></span>
  </footer>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════════
   DATA — 12 TRAINING SCENARIOS
   ═══════════════════════════════════════════════════════════════════════════════ */
const SCENARIOS = [
  /* ── 1 ── FRESH TEMPLATE ──────────────────────────────────────────────── */
  {
    title: "Fresh Template — All Checks Pass",
    lane: "stateless",
    desc: "A newly issued mining template passes every staleness guard. Understand the order of checks performed by <code>TemplateMetadata::IsStale()</code>.",
    diagram: `<svg viewBox="0 0 520 320" width="520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
        </marker>
      </defs>
      <!-- Start -->
      <rect x="185" y="10" width="150" height="34" rx="17" fill="#1d3557" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="260" y="32" text-anchor="middle" fill="#58a6ff" font-size="12" font-family="sans-serif">IsStale() called</text>
      <line x1="260" y1="44" x2="260" y2="68" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Check 1 -->
      <rect x="145" y="68" width="230" height="34" rx="5" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
      <text x="260" y="80" text-anchor="middle" fill="#8b949e" font-size="10" font-family="sans-serif">CHECK 1: Timestamp valid?</text>
      <text x="260" y="95" text-anchor="middle" fill="#e6edf3" font-size="11" font-family="monospace">nCreationTime &gt; 0 ✓   age &lt; 600s ✓</text>
      <line x1="260" y1="102" x2="260" y2="126" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Check 2 -->
      <rect x="145" y="126" width="230" height="34" rx="5" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
      <text x="260" y="138" text-anchor="middle" fill="#8b949e" font-size="10" font-family="sans-serif">CHECK 2: Channel height valid?</text>
      <text x="260" y="153" text-anchor="middle" fill="#e6edf3" font-size="11" font-family="monospace">nChannelHeight != 0 ✓</text>
      <line x1="260" y1="160" x2="260" y2="184" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Check 3 -->
      <rect x="145" y="184" width="230" height="46" rx="5" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
      <text x="260" y="198" text-anchor="middle" fill="#8b949e" font-size="10" font-family="sans-serif">CHECK 3: Channel height match?</text>
      <text x="260" y="213" text-anchor="middle" fill="#e6edf3" font-size="11" font-family="monospace">chain.nChannelHeight == tmpl.nChannelHeight - 1</text>
      <text x="260" y="226" text-anchor="middle" fill="#3fb950" font-size="11" font-family="monospace">2165442 == 2165443 - 1 ✓</text>
      <line x1="260" y1="230" x2="260" y2="254" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Result -->
      <rect x="170" y="254" width="180" height="42" rx="8" fill="#1a3a1a" stroke="#3fb950" stroke-width="2"/>
      <text x="260" y="271" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold" font-family="sans-serif">return false</text>
      <text x="260" y="287" text-anchor="middle" fill="#3fb950" font-size="11" font-family="sans-serif">✅ FRESH — Mine this block</text>
    </svg>`,
    state: [
      ["nCreationTime", "now - 30s", "ok", "Template is 30 seconds old"],
      ["nAge", "30", "ok", "Well under 600 s limit"],
      ["nChannelHeight (template)", "2165443", "info", "Mining block 2 165 443"],
      ["chain.nChannelHeight", "2165442", "ok", "Chain is at N-1 — correct"],
      ["GetLastState result", "true", "ok", "Channel state found"],
    ],
    question: "What value does <code>IsStale()</code> return for this template?",
    options: [
      { text: "true — the template is stale", correct: false },
      { text: "false — the template is fresh", correct: true },
      { text: "It throws an exception", correct: false },
      { text: "It depends on channel difficulty", correct: false },
    ],
    feedback: {
      correct: "Correct! All three guards pass: valid timestamp, non-zero channel height, and <code>chain.nChannelHeight == nChannelHeight - 1</code>. <code>IsStale()</code> returns <code>false</code>.",
      wrong:   "Incorrect. Every check passes: age &lt; 600 s, channel height is non-zero, and the blockchain sits exactly one behind the template. <code>IsStale()</code> returns <code>false</code>."
    }
  },

  /* ── 2 ── AGE TIMEOUT ─────────────────────────────────────────────────── */
  {
    title: "Age Timeout — 600 s Safety Net",
    lane: "stateless",
    desc: "Templates older than <strong>MAX_TEMPLATE_AGE_SECONDS (600 s)</strong> are always stale regardless of chain state. This is the secondary (first-evaluated) guard.",
    diagram: `<svg viewBox="0 0 520 280" width="520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
        </marker>
        <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#f85149"/>
        </marker>
      </defs>
      <rect x="185" y="10" width="150" height="34" rx="17" fill="#1d3557" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="260" y="32" text-anchor="middle" fill="#58a6ff" font-size="12" font-family="sans-serif">IsStale() called</text>
      <line x1="260" y1="44" x2="260" y2="68" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="145" y="68" width="230" height="46" rx="5" fill="#1c2128" stroke="#30363d"/>
      <text x="260" y="83" text-anchor="middle" fill="#8b949e" font-size="10" font-family="sans-serif">CHECK 1: Age timeout</text>
      <text x="260" y="99" text-anchor="middle" fill="#e6edf3" font-size="11" font-family="monospace">nAge = 847s</text>
      <text x="260" y="112" text-anchor="middle" fill="#f85149" font-size="11" font-family="monospace">847 &gt; 600 → STALE ✗</text>
      <line x1="260" y1="114" x2="260" y2="138" stroke="#f85149" stroke-width="1.5" marker-end="url(#arr-r)"/>

      <!-- Skipped -->
      <rect x="145" y="138" width="230" height="34" rx="5" fill="#0d1117" stroke="#30363d" stroke-dasharray="4"/>
      <text x="260" y="156" text-anchor="middle" fill="#444c56" font-size="11" font-family="sans-serif">CHECK 2 &amp; 3: skipped</text>
      <line x1="260" y1="172" x2="260" y2="196" stroke="#f85149" stroke-width="1.5" marker-end="url(#arr-r)"/>

      <rect x="170" y="196" width="180" height="42" rx="8" fill="#3a1a1a" stroke="#f85149" stroke-width="2"/>
      <text x="260" y="213" text-anchor="middle" fill="#f85149" font-size="13" font-weight="bold" font-family="sans-serif">return true</text>
      <text x="260" y="229" text-anchor="middle" fill="#ff9494" font-size="11" font-family="sans-serif">🚫 STALE — Discard template</text>
    </svg>`,
    state: [
      ["nCreationTime", "now - 847s", "bad", "Template is 847 seconds old"],
      ["MAX_TEMPLATE_AGE_SECONDS", "600", "info", "Constant in falcon_constants.h"],
      ["nAge > 600", "true", "bad", "Triggers immediate stale return"],
      ["Channel height checks", "SKIPPED", "warn", "Short-circuit: age check fires first"],
    ],
    question: "Why does the age check fire before the channel height check?",
    options: [
      { text: "Channel height is more expensive to compute", correct: false },
      { text: "Age check is listed first in the source code and returns early", correct: true },
      { text: "600 s is the block target time", correct: false },
      { text: "Channel height is only checked on submission", correct: false },
    ],
    feedback: {
      correct: "Correct! <code>IsStale()</code> checks age first (<code>nAge &gt; MAX_TEMPLATE_AGE_SECONDS</code>) and returns <code>true</code> immediately, so channel height is never evaluated.",
      wrong:   "Incorrect. The age check appears first in the function and uses an early <code>return true</code> when the template exceeds 600 s. Channel height is never reached in this code path."
    }
  },

  /* ── 3 ── INVALID TIMESTAMP ───────────────────────────────────────────── */
  {
    title: "Invalid Timestamp — Zero nCreationTime",
    lane: "stateless",
    desc: "An uninitialized or corrupted <code>nCreationTime == 0</code> is treated as stale immediately. The guard also fires when the clock appears to run backward (<code>nNow &lt; nCreationTime</code>).",
    diagram: `<svg viewBox="0 0 520 260" width="520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#f85149"/>
        </marker>
      </defs>
      <rect x="185" y="10" width="150" height="34" rx="17" fill="#1d3557" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="260" y="32" text-anchor="middle" fill="#58a6ff" font-size="12" font-family="sans-serif">IsStale() called</text>
      <line x1="260" y1="44" x2="260" y2="68" stroke="#f85149" stroke-width="1.5" marker-end="url(#arr-r)"/>

      <rect x="120" y="68" width="280" height="56" rx="5" fill="#1c2128" stroke="#f85149"/>

let current     = 0;

let correct     = 0;

/* ═══════════════════════════════════════════════════════════════════════════════
   RENDER HELPERS
   ═══════════════════════════════════════════════════════════════════════════════ */
function laneBadge(lane) {
  const map = {
    stateless: ['lane-stateless', 'Stateless · Port 9323'],
    legacy:    ['lane-legacy',    'Legacy · Port 8323'],
    both:      ['lane-both',      'Both Lanes'],
  };
  const [cls, label] = map[lane] || map.both;
  return `<span class="lane-badge ${cls}">${label}</span>`;
}

function stateClass(v) {
  if (v === 'ok')   return 'val-ok';
  if (v === 'bad')  return 'val-bad';
  if (v === 'warn') return 'val-warn';
  return 'val-info';
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '<div class="sidebar-title">Scenarios</div>' +
    SCENARIOS.map((s, i) => {
      const res = answered[i];
      let badge = `<span class="badge badge-pending"></span>`;
      if (res === true)  badge = `<span class="badge badge-correct">✓</span>`;
      if (res === false) badge = `<span class="badge badge-wrong">✗</span>`;
      return `<div class="scenario-item${i===current?' active':''}" data-i="${i}">
        <span class="num">${i+1}</span>
        <span class="label">${s.title}</span>
        ${badge}
      </div>`;
    }).join('');

  sidebar.querySelectorAll('.scenario-item').forEach(el => {
    el.addEventListener('click', () => { current = +el.dataset.i; renderAll(); });
  });
}

function renderContent() {
  const s   = SCENARIOS[current];
  const ans = answered[current];

  /* state table rows */
  const rows = (s.state || []).map(([k,v,cls,note]) =>
    `<tr>
      <td><code>${escHtml(k)}</code></td>
      <td class="${stateClass(cls)}">${escHtml(v)}</td>
      <td style="color:var(--muted)">${escHtml(note)}</td>
    </tr>`
  ).join('');

  /* options */
  const opts = s.options.map((o, oi) => {
    let extra = '';
    if (ans !== null) {
      if (o.correct)           extra = ' correct';
      else if (oi === ans && !o.correct) extra = ' wrong';
    }
    return `<button class="opt-btn${extra}" data-oi="${oi}"${ans!==null?' disabled':''}>
      <span class="opt-key">${'ABCD'[oi]}</span>
      <span>${escHtml(o.text)}</span>
    </button>`;
  }).join('');

  /* feedback */
  let fbClass = '', fbContent = '';
  if (ans !== null) {
    const isCorrect = s.options[ans].correct;
    fbClass = isCorrect ? 'correct' : 'wrong';
    const fb = isCorrect ? s.feedback.correct : s.feedback.wrong;
    fbContent = `<strong>${isCorrect ? '✅ Correct!' : '❌ Incorrect'}</strong>${fb}`;
  }

  /* nav buttons */
  const prevDisabled = current === 0 ? ' disabled' : '';
  const nextDisabled = current === SCENARIOS.length - 1 ? ' disabled' : '';

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        ${laneBadge(s.lane)}
        <div>
          <h2>${escHtml(s.title)}</h2>
          <p class="desc">${s.desc}</p>
        </div>
      </div>

      <div class="diagram-wrap">${s.diagram}</div>
    </div>

    ${rows ? `<div class="state-table">
      <table>
        <thead><tr><th>Variable</th><th>Value</th><th>Note</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>` : ''}

    <div class="question-box">
      <div class="q-label">Question ${current+1} of ${SCENARIOS.length}</div>
      <p>${s.question}</p>
      <div class="options" id="optionsBox">${opts}</div>
    </div>

    <div class="feedback ${fbClass}${ans!==null?' show':''}" id="feedbackBox">
      ${fbContent}
    </div>

    <div class="nav-row">
      <button class="btn btn-icon"${prevDisabled} id="btnPrev">← Prev</button>
      <button class="btn primary btn-icon"${nextDisabled} id="btnNext">Next →</button>
      <span class="hint-text">Keyboard: <kbd>←</kbd><kbd>→</kbd> navigate · <kbd>A</kbd>–<kbd>D</kbd> answer</span>
    </div>
  `;

  /* bind option clicks */
  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => chooseOption(+btn.dataset.oi));
  });
  document.getElementById('btnPrev').addEventListener('click', () => { if(current>0){current--;renderAll();} });
  document.getElementById('btnNext').addEventListener('click', () => { if(current<SCENARIOS.length-1){current++;renderAll();} });
}

function renderScores() {
  document.getElementById('scoreCorrect').textContent = correct;
  document.getElementById('scoreWrong').textContent   = wrong;
  document.getElementById('scoreCurrent').textContent = current + 1;
  const done = answered.filter(a => a !== null).length;
  document.getElementById('progressFill').style.width = (done / SCENARIOS.length * 100) + '%';
}

function renderAll() {
  renderSidebar();
  renderContent();
  renderScores();
  document.getElementById('content').scrollTop = 0;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   ACTIONS
   ═══════════════════════════════════════════════════════════════════════════════ */
function chooseOption(oi) {
  if (answered[current] !== null) return;
  answered[current] = oi;
  const isCorrect = SCENARIOS[current].options[oi].correct;
  if (isCorrect) correct++; else wrong++;
  renderAll();
}

function restart() {
  current  = 0;
  answered = new Array(SCENARIOS.length).fill(null);
  correct  = 0;
  wrong    = 0;
  renderAll();
}

/* ═══════════════════════════════════════════════════════════════════════════════
   KEYBOARD
   ═══════════════════════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  switch (e.key) {
    case 'ArrowLeft':  if (current > 0) { current--; renderAll(); } break;
    case 'ArrowRight': if (current < SCENARIOS.length-1) { current++; renderAll(); } break;
    case 'a': case 'A': chooseOption(0); break;
    case 'b': case 'B': chooseOption(1); break;
    case 'c': case 'C': chooseOption(2); break;
    case 'd': case 'D': chooseOption(3); break;
    case 'r': case 'R': restart(); break;
  }
});

/* ═══════════════════════════════════════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════════════════════════════════════ */
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ═══════════════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════════════ */
renderAll();
</script>
</body>
</html>
