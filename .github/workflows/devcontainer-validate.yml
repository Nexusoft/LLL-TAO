name: Devcontainer Validation

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/devcontainer-validate.yml"
      - ".github/workflows/copilot-setup-steps.yml"
      - ".devcontainer/**"
      - "contrib/devtools/install-build-deps.sh"
      - "makefile.cli"
      - "src/**"
      - "tests/**"
      - "README.md"
      - "docs/**"
  pull_request:
    paths:
      - ".github/workflows/devcontainer-validate.yml"
      - ".github/workflows/copilot-setup-steps.yml"
      - ".devcontainer/**"
      - "contrib/devtools/install-build-deps.sh"
      - "makefile.cli"
      - "src/**"
      - "tests/**"
      - "README.md"
      - "docs/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: sudo bash "${GITHUB_WORKSPACE}/contrib/devtools/install-build-deps.sh"

      - name: Smoke build
        run: make -f makefile.cli -j2

      - name: Unit-test build
        run: make -f makefile.cli UNIT_TESTS=1 -j2

      - name: Unit-test run
        # Execute the unit-test binary produced by the previous step.
        # Catch2 returns a non-zero exit code if any assertion fails, which
        # surfaces test regressions in the workflow run summary.  We pipe
        # output through `tee` so the full Catch2 report is preserved in the
        # CI log even when assertions fail.
        #
        # NOTE: `continue-on-error: true` is set as a transitional measure
        # while the small number of pre-existing test-only flakes documented
        # in the bundle PR are repaired.  Flip this to strict (`false` or
        # remove the line) once the unit test binary exits 0 on a clean run
        # of `origin/NODE`.
        continue-on-error: true
        run: |
          set -o pipefail
          ./nexus 2>&1 | tee unit-tests.log
